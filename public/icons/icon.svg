<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#FC8181"/>
      <stop offset="45%"  stop-color="#E53E3E"/>
      <stop offset="100%" stop-color="#420A0A"/>
    </radialGradient>
    <linearGradient id="dg" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FED7D7"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="12"
                    flood-color="#7B0000" flood-opacity="0.5"/>
    </filter>
    <!-- Un bras du flocon de sucre -->
    <g id="arm" fill="none" stroke="#C53030" stroke-linecap="round">
      <line x1="0" y1="0"   x2="0"   y2="-80" stroke-width="12"/>
      <line x1="0" y1="-55" x2="-24" y2="-68" stroke-width="9"/>
      <line x1="0" y1="-55" x2="24"  y2="-68" stroke-width="9"/>
      <line x1="0" y1="-32" x2="-16" y2="-42" stroke-width="9"/>
      <line x1="0" y1="-32" x2="16"  y2="-42" stroke-width="9"/>
    </g>
  </defs>

  <!-- Fond arrondi rouge -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Granules de sucre éparpillées -->
  <circle cx="150" cy="92"  r="7" fill="white" opacity="0.38"/>
  <circle cx="388" cy="115" r="5" fill="white" opacity="0.30"/>
  <circle cx="432" cy="262" r="4" fill="white" opacity="0.25"/>
  <circle cx="416" cy="190" r="3" fill="white" opacity="0.20"/>
  <circle cx="120" cy="352" r="5" fill="white" opacity="0.30"/>
  <circle cx="160" cy="74"  r="3" fill="white" opacity="0.25"/>
  <circle cx="96"  cy="208" r="4" fill="white" opacity="0.20"/>
  <circle cx="382" cy="402" r="4" fill="white" opacity="0.18"/>
  <circle cx="70"  cy="308" r="3" fill="white" opacity="0.18"/>
  <circle cx="452" cy="378" r="3" fill="white" opacity="0.15"/>
  <circle cx="460" cy="140" r="2" fill="white" opacity="0.20"/>
  <circle cx="58"  cy="155" r="2" fill="white" opacity="0.18"/>

  <!-- Goutte de sang (teardrop blanche) -->
  <path d="M256,68
           C300,112 378,222 378,320
           A122,122 0 0 1 134,320
           C134,222 212,112 256,68 Z"
        fill="url(#dg)" filter="url(#sh)"/>

  <!-- Reflet brillant (haut gauche de la goutte) -->
  <ellipse cx="210" cy="178" rx="32" ry="18" fill="white" opacity="0.44"
           transform="rotate(-38,210,178)"/>

  <!-- Cristal de sucre — flocon à 6 branches symétrique -->
  <g transform="translate(256,310)">
    <use href="#arm"/>
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>
    <circle r="11" fill="#C53030"/>
  </g>
</svg>
